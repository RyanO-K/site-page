<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Kanban — live board demo</title>
<!--
  Self-contained, no-network showcase of the AI Kanban board: a file-based kanban
  whose headless orchestrator dispatches Claude sub-agents to work tickets. Everything
  here is fake/hard-coded — a looping scripted demo (~25s per lap) that recreates the
  real board UI (palette/topbar from .kanban/kanban.css) and shows one agent "working"
  a card: pulsing dot, shimmer, and a comment that types itself out, then the card
  slides to Done and the next Ready card picks up. Designed to read well both full-size
  and inside the portfolio's ~360px non-scrolling <iframe> preview.
-->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-alt: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --dur-fast: 120ms;
    --ease-out: cubic-bezier(0.2, 0, 0, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* topbar — mirrors the real board's treatment (📋 Task Board + live status pill) */
  .topbar {
    display: flex; align-items: center; gap: 10px 14px;
    padding: 9px 14px; background: var(--surface);
    border-bottom: 1px solid var(--surface-alt);
  }
  .topbar h1 { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .board-pick {
    background: var(--bg); color: var(--text-muted);
    border: 1px solid var(--surface-alt);
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .status-pill {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px 3px 8px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--surface-alt);
    font-size: 11px; font-weight: 600; color: var(--text-muted); white-space: nowrap;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

  /* board layout — always four columns side-by-side (no vertical stacking) so the
     In-Progress agent stays visible in a narrow, non-scrolling iframe. */
  .board {
    display: flex; gap: 8px;
    padding: 10px 12px; height: calc(100vh - 45px);
    align-items: stretch;
  }
  .column {
    flex: 1 1 0; min-width: 0;
    background: var(--surface); border-radius: 8px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .col-header {
    padding: 8px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; border-bottom: 2px solid var(--col-color);
    display: flex; align-items: center; gap: 6px; border-radius: 8px 8px 0 0;
    color: var(--text);
  }
  .col-count {
    background: var(--col-color); color: #fff; font-size: 10px;
    padding: 1px 6px; border-radius: 9px; font-weight: 700; margin-left: auto;
  }
  .col-body {
    padding: 6px; flex: 1; display: flex; flex-direction: column; gap: 5px;
    overflow: hidden;
  }

  /* cards — dark, coloured left border keyed to the column (--col-color inherits) */
  .card {
    background: var(--bg); border-left: 3px solid var(--col-color); border-radius: 4px;
    padding: 8px 9px 7px; font-size: 12px; position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,.25);
  }
  .card-title {
    font-weight: 600; line-height: 1.3; display: flex; gap: 5px; align-items: baseline;
  }
  .card-id { color: var(--text-muted); font-size: 10px; font-weight: 400; flex-shrink: 0; }
  .card-title .txt { overflow: hidden; text-overflow: ellipsis; }

  /* agent working panel — pulsing dot + spinner, working label, shimmer, typed comment */
  .card-agent { margin-top: 6px; display: none; }
  .card.working .card-agent { display: block; }
  .agent-line {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 600; color: #93c5fd;
  }
  .spinner {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid rgba(96,165,250,.3); border-top-color: #60a5fa;
    animation: spin .7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .shimmer {
    height: 3px; border-radius: 3px; margin: 6px 0 5px; overflow: hidden;
    background: linear-gradient(90deg, #1e3a5f 25%, #3b82f6 50%, #1e3a5f 75%);
    background-size: 200% 100%; animation: shimmer 1.1s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* the agent's comment — types out while working, persists (with a ✓) once done */
  .card-comment {
    font-size: 11px; line-height: 1.4; color: var(--text-muted);
    display: none; margin-top: 5px;
  }
  .card.working .card-comment,
  .card.done .card-comment { display: block; }
  .card.working .card-comment::after {
    content: '▋'; color: #60a5fa; animation: caret .8s step-end infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }
  .card.done .card-comment::before { content: '✓ '; color: #22c55e; font-weight: 700; }
  .card.done .card-title .txt { text-decoration: line-through; opacity: .6; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 7px; gap: 6px;
  }
  .card-status-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 3px;
    background: var(--surface-alt); color: var(--text-muted); white-space: nowrap;
  }
  .model-badge {
    font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
    letter-spacing: .2px; white-space: nowrap;
  }
  .model-badge.sonnet { background: rgba(59,130,246,.18); color: #93c5fd; }
  .model-badge.opus   { background: rgba(139,92,246,.18); color: #c4b5fd; }
  .model-badge.haiku  { background: rgba(20,184,166,.18); color: #7dd3c1; }

  /* enter / exit / slide — GPU-friendly transform+opacity, restrained timing */
  .card.card-enter { animation: cardEnter 200ms var(--ease-out); }
  @keyframes cardEnter { from { opacity: 0; transform: translateY(-8px) scale(.97); } to { opacity: 1; transform: none; } }
  .card.card-exit { animation: cardExit 260ms var(--ease-out) forwards; }
  @keyframes cardExit { to { opacity: 0; transform: scale(.92); } }
  .col-count.pop { animation: countPop var(--dur-fast) var(--ease-spring); }
  @keyframes countPop { 0% { transform: scale(1); } 45% { transform: scale(1.4); } 100% { transform: scale(1); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>📋 Task Board</h1>
    <span class="board-pick">ai-kanban</span>
    <span class="status-pill"><span class="dot"></span>orchestrator · live</span>
  </div>
  <div class="board" id="board"></div>

<script>
(function () {
  'use strict';

  // ── Column definitions (order = flow direction) ─────────────────────────────
  const COLS = [
    { key: 'todo',       label: 'To Do',       color: '#64748b' },
    { key: 'ready',      label: 'Ready',       color: '#f59e0b' },
    { key: 'inprogress', label: 'In Progress', color: '#3b82f6' },
    { key: 'done',       label: 'Done',        color: '#22c55e' },
  ];
  const STATUS = { todo: 'To Do', ready: 'Ready', inprogress: 'In Progress', done: 'Done' };
  const DONE_MAX = 3; // keep the Done column short so the board loops instead of growing

  // ── Ticket pool (cycles) — real ai-kanban / orchestrator flavour ────────────
  const POOL = [
    { title: 'Idempotent kanban server startup',   model: 'sonnet', comment: 'Added a single-instance guard; port 8745 no longer wedges. 262 tests pass.' },
    { title: 'FLIP slide animation for card moves', model: 'sonnet', comment: 'Transforms only touch the GPU; slides land at 180ms. Suite green.' },
    { title: 'Enforce orchestrator concurrency cap', model: 'opus',  comment: 'Cap honoured in orchestrator_core; 3 agents max. Unit tests pass.' },
    { title: 'Notification bell for blocked tickets', model: 'sonnet', comment: 'Badge hides at zero; blocked tickets now surface. 408 passing.' },
    { title: 'Two-column board settings modal',      model: 'sonnet', comment: 'Implemented the two-column modal; all 416 tests pass.' },
    { title: 'Performance tab CPU rollup',           model: 'haiku',  comment: 'Rolled up subprocess CPU over a 5-min window. psutil path ok.' },
    { title: 'Docker dev-workspace image',           model: 'opus',   comment: 'node:20-slim + py3 + Claude CLI image builds clean. 407/410 in-container.' },
    { title: 'Reduced-motion accessibility pass',    model: 'sonnet', comment: 'prefers-reduced-motion kills nonessential animation. Audit green.' },
  ];

  // ── State ───────────────────────────────────────────────────────────────────
  const cards = {};                                   // id -> {id, title, model, comment, done}
  const state = { todo: [], ready: [], inprogress: [], done: [] };
  const els = new Map();                               // id -> card element
  let nextId = 1, poolAt = 0;

  function mint(seed) {
    const t = seed || POOL[poolAt++ % POOL.length];
    const id = nextId++;
    cards[id] = { id, title: t.title, model: t.model, comment: t.comment, done: false };
    return id;
  }

  // Seed the board so it already looks alive on the first frame.
  state.done.push((function () { const id = mint(); cards[id].done = true; return id; })());
  state.inprogress.push(mint());
  state.ready.push(mint(), mint());
  state.todo.push(mint(), mint());

  // ── DOM scaffolding ──────────────────────────────────────────────────────────
  const board = document.getElementById('board');
  const bodies = {};
  const counts = {};
  COLS.forEach(c => {
    const col = document.createElement('div');
    col.className = 'column';
    col.style.setProperty('--col-color', c.color);
    const hdr = document.createElement('div');
    hdr.className = 'col-header';
    const count = document.createElement('span');
    count.className = 'col-count';
    hdr.append(c.label + ' ', count);
    const body = document.createElement('div');
    body.className = 'col-body';
    col.append(hdr, body);
    board.appendChild(col);
    bodies[c.key] = body;
    counts[c.key] = count;
  });

  function makeCard(id) {
    const c = cards[id];
    const el = document.createElement('div');
    el.className = 'card card-enter';
    el.dataset.id = id;
    el.innerHTML =
      '<div class="card-title"><span class="card-id">#' + id + '</span>' +
        '<span class="txt"></span></div>' +
      '<div class="card-agent">' +
        '<div class="agent-line"><span class="spinner"></span>🤖 <span class="am"></span> working…</div>' +
        '<div class="shimmer"></div>' +
      '</div>' +
      '<div class="card-comment"></div>' +
      '<div class="card-footer">' +
        '<span class="card-status-badge"></span>' +
        '<span class="model-badge ' + c.model + '">' + c.model + '</span>' +
      '</div>';
    el.querySelector('.txt').textContent = c.title;
    el.querySelector('.am').textContent = c.model;
    if (c.done) el.querySelector('.card-comment').textContent = c.comment; // pre-typed seed
    el.addEventListener('animationend', e => { if (e.animationName === 'cardEnter') el.classList.remove('card-enter'); });
    els.set(id, el);
    return el;
  }

  const colOf = id => COLS.find(c => state[c.key].includes(id)).key;

  // Rewrite a card's per-column bits (status badge, done styling). The typed comment
  // element is left untouched here — the typing routine owns it.
  function paint(id) {
    const el = els.get(id), c = cards[id], key = colOf(id);
    el.querySelector('.card-status-badge').textContent = STATUS[key];
    el.classList.toggle('done', !!c.done);
    el.classList.toggle('working', c.working === true);
  }

  // ── FLIP: capture rects → move DOM in state order → invert & play ────────────
  function firstRects() {
    const m = new Map();
    els.forEach((el, id) => m.set(id, el.getBoundingClientRect()));
    return m;
  }
  function render(first) {
    COLS.forEach(c => {
      state[c.key].forEach(id => {
        const el = els.get(id) || makeCard(id);
        bodies[c.key].appendChild(el); // moves existing node, preserving it for FLIP
        paint(id);
      });
      const n = counts[c.key];
      if (n.textContent !== String(state[c.key].length)) {
        n.textContent = state[c.key].length;
        n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
      }
    });
    if (!first) return;
    els.forEach((el, id) => {
      const f = first.get(id);
      if (!f) return; // freshly created -> its own enter animation
      const l = el.getBoundingClientRect();
      const dx = f.left - l.left, dy = f.top - l.top;
      if (!dx && !dy) return;
      el.style.transition = 'none';
      el.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
      requestAnimationFrame(() => {
        el.style.transition = 'transform 340ms ' + getComputedStyle(document.documentElement).getPropertyValue('--ease-out');
        el.style.transform = '';
      });
    });
  }

  function exitCard(id) {
    const el = els.get(id);
    els.delete(id); delete cards[id];
    if (!el) return;
    el.classList.add('card-exit');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  // ── Demo clock ───────────────────────────────────────────────────────────────
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function typeComment(id) {
    const el = els.get(id).querySelector('.card-comment');
    const text = cards[id].comment;
    el.textContent = '';
    for (let i = 0; i < text.length; i++) {
      el.textContent += text[i];
      await sleep(24);
    }
  }

  // Complete the active card, then shuffle the pipeline forward one step.
  function advance(completedId) {
    const first = firstRects();
    cards[completedId].working = false;
    cards[completedId].done = true;
    state.inprogress = state.inprogress.filter(x => x !== completedId);
    state.done.unshift(completedId);
    while (state.done.length > DONE_MAX) exitCard(state.done.pop());
    if (state.ready.length) state.inprogress.push(state.ready.shift()); // Ready → In Progress
    if (state.todo.length) state.ready.push(state.todo.shift());        // To Do → Ready
    state.todo.push(mint());                                            // fresh card lands in To Do
    render(first);
  }

  async function run() {
    render(null); // initial paint (no FLIP)
    await sleep(1200);
    // eslint-disable-next-line no-constant-condition
    while (true) {
      const id = state.inprogress[0];
      cards[id].working = true;
      paint(id);
      await typeComment(id);
      await sleep(1100);
      advance(id);
      await sleep(1700); // let the slide settle before the next agent starts
    }
  }

  run();
})();
</script>
</body>
</html>
