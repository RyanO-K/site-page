<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Kanban — live board demo</title>
<!--
  Self-contained, no-network showcase of the AI Kanban board: a file-based kanban
  whose headless orchestrator dispatches Claude sub-agents to work tickets. Everything
  here is fake/hard-coded — a looping scripted demo (~25s per lap) that recreates the
  real board UI (palette/topbar from .kanban/kanban.css) and shows one agent "working"
  a card: pulsing dot, shimmer, and a comment that types itself out, then the card
  slides to Done and the next Ready card picks up. Designed to read well both full-size
  and inside the portfolio's ~360px non-scrolling <iframe> preview.

  INTERACTIVE (ticket #20): the moment you click a card — or drag one between columns —
  the scripted demo freezes and hands you the board, exactly like the /discord showcase.
  A click opens the ticket's detail side panel (as the real board does); cards can be
  dragged between To Do / Ready / In Progress / Done. A "Resume demo" banner restarts the
  auto-play. In the tiny iframe preview the card sets pointer-events:none, so the preview
  just keeps looping — interaction only kicks in when the page is opened full-size.
-->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-alt: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --dur-fast: 120ms;
    --ease-out: cubic-bezier(0.2, 0, 0, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
  }

  /* topbar — mirrors the real board's treatment (📋 Task Board + live status pill) */
  .topbar {
    display: flex; align-items: center; gap: 10px 14px;
    padding: 9px 14px; background: var(--surface);
    border-bottom: 1px solid var(--surface-alt);
  }
  .topbar h1 { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .board-pick {
    background: var(--bg); color: var(--text-muted);
    border: 1px solid var(--surface-alt);
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .status-pill {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px 3px 8px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--surface-alt);
    font-size: 11px; font-weight: 600; color: var(--text-muted); white-space: nowrap;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

  /* board layout — always four columns side-by-side (no vertical stacking) so the
     In-Progress agent stays visible in a narrow, non-scrolling iframe. */
  .board {
    display: flex; gap: 8px;
    padding: 10px 12px; flex: 1 1 0; min-height: 0;
    align-items: stretch;
  }
  .column {
    flex: 1 1 0; min-width: 0;
    background: var(--surface); border-radius: 8px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .col-header {
    padding: 8px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; border-bottom: 2px solid var(--col-color);
    display: flex; align-items: center; gap: 6px; border-radius: 8px 8px 0 0;
    color: var(--text);
  }
  .col-count {
    background: var(--col-color); color: #fff; font-size: 10px;
    padding: 1px 6px; border-radius: 9px; font-weight: 700; margin-left: auto;
  }
  .col-body {
    padding: 6px; flex: 1; display: flex; flex-direction: column; gap: 5px;
    overflow: hidden;
  }

  /* cards — dark, coloured left border keyed to the column (--col-color inherits) */
  .card {
    background: var(--bg); border-left: 3px solid var(--col-color); border-radius: 4px;
    padding: 8px 9px 7px; font-size: 12px; position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,.25);
  }
  .card-title {
    font-weight: 600; line-height: 1.3; display: flex; gap: 5px; align-items: baseline;
  }
  .card-id { color: var(--text-muted); font-size: 10px; font-weight: 400; flex-shrink: 0; }
  .card-title .txt { overflow: hidden; text-overflow: ellipsis; }

  /* agent working panel — pulsing dot + spinner, working label, shimmer, typed comment */
  .card-agent { margin-top: 6px; display: none; }
  .card.working .card-agent { display: block; }
  .agent-line {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 600; color: #93c5fd;
  }
  .spinner {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid rgba(96,165,250,.3); border-top-color: #60a5fa;
    animation: spin .7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .shimmer {
    height: 3px; border-radius: 3px; margin: 6px 0 5px; overflow: hidden;
    background: linear-gradient(90deg, #1e3a5f 25%, #3b82f6 50%, #1e3a5f 75%);
    background-size: 200% 100%; animation: shimmer 1.1s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* the agent's comment — types out while working, persists (with a ✓) once done */
  .card-comment {
    font-size: 11px; line-height: 1.4; color: var(--text-muted);
    display: none; margin-top: 5px;
  }
  .card.working .card-comment,
  .card.done .card-comment { display: block; }
  .card.working .card-comment::after {
    content: '▋'; color: #60a5fa; animation: caret .8s step-end infinite;
  }
  @keyframes caret { 50% { opacity: 0; } }
  .card.done .card-comment::before { content: '✓ '; color: #22c55e; font-weight: 700; }
  .card.done .card-title .txt { text-decoration: line-through; opacity: .6; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 7px; gap: 6px;
  }
  .card-status-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 3px;
    background: var(--surface-alt); color: var(--text-muted); white-space: nowrap;
  }
  .model-badge {
    font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
    letter-spacing: .2px; white-space: nowrap;
  }
  .model-badge.sonnet { background: rgba(59,130,246,.18); color: #93c5fd; }
  .model-badge.opus   { background: rgba(139,92,246,.18); color: #c4b5fd; }
  .model-badge.haiku  { background: rgba(20,184,166,.18); color: #7dd3c1; }

  /* enter / exit / slide — GPU-friendly transform+opacity, restrained timing */
  .card.card-enter { animation: cardEnter 200ms var(--ease-out); }
  @keyframes cardEnter { from { opacity: 0; transform: translateY(-8px) scale(.97); } to { opacity: 1; transform: none; } }
  .card.card-exit { animation: cardExit 260ms var(--ease-out) forwards; }
  @keyframes cardExit { to { opacity: 0; transform: scale(.92); } }
  .col-count.pop { animation: countPop var(--dur-fast) var(--ease-spring); }
  @keyframes countPop { 0% { transform: scale(1); } 45% { transform: scale(1.4); } 100% { transform: scale(1); } }

  /* ── Interactive mode (ticket #20) ──────────────────────────────────────────
     Clicking a card (or dragging one) stops the scripted demo and hands the board
     to the visitor — cards become draggable between columns and open a detail
     panel, mirroring the real board. A banner + Resume control restart auto-play. */
  .card { cursor: pointer; }
  .card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.4); }
  .board.interactive .card { cursor: grab; }
  .card.dragging { opacity: .4; cursor: grabbing; }
  .col-body.drop-target { background: rgba(59,130,246,.10); outline: 1px dashed rgba(59,130,246,.55); outline-offset: -3px; border-radius: 6px; }

  /* the status pill flips to a paused/amber state while you're driving the board */
  .status-pill.paused { border-color: rgba(245,158,11,.5); color: #fcd34d; }
  .status-pill.paused .dot { background: #f59e0b; animation: none; }

  /* paused banner (mirrors the /discord showcase's "example inputs paused" banner) */
  .paused-banner {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 7px 14px; background: rgba(59,130,246,.12);
    border-bottom: 1px solid var(--surface-alt); font-size: 12px; color: var(--text);
  }
  .paused-banner[hidden] { display: none; }
  .paused-banner span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .resume-btn {
    display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 4px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out);
  }
  .resume-btn:hover { background: #2563eb; transform: translateY(-1px); }
  .resume-btn:active { transform: scale(.96); }

  /* ── detail side panel (the real board opens one on card click) ─────────────── */
  .panel-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    opacity: 0; pointer-events: none; transition: opacity 220ms var(--ease-out); z-index: 40;
  }
  .panel-overlay.open { opacity: 1; pointer-events: auto; }
  .panel {
    position: fixed; top: 0; right: 0; height: 100%; width: min(380px, 88vw);
    background: var(--surface); border-left: 1px solid var(--surface-alt);
    box-shadow: -10px 0 28px rgba(0,0,0,.45);
    transform: translateX(100%); transition: transform 240ms var(--ease-out);
    z-index: 50; display: flex; flex-direction: column;
  }
  .panel.open { transform: none; }
  .panel-head {
    padding: 14px 16px; border-bottom: 1px solid var(--surface-alt);
    display: flex; align-items: flex-start; gap: 10px;
  }
  .panel-head h2 { font-size: 15px; font-weight: 700; line-height: 1.35; flex: 1; }
  .panel-close {
    background: var(--bg); color: var(--text-muted); border: 1px solid var(--surface-alt);
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 13px; flex-shrink: 0;
  }
  .panel-close:hover { color: var(--text); background: var(--surface-alt); }
  .panel-body { padding: 14px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
  .panel-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .panel-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); font-weight: 700; margin-bottom: 5px; }
  .panel-detail { font-size: 13px; line-height: 1.55; color: var(--text); }
  .panel-comment {
    background: var(--bg); border: 1px solid var(--surface-alt); border-radius: 6px;
    padding: 9px 11px; font-size: 12px; line-height: 1.5; color: var(--text-muted);
  }
  .panel-comment .who { color: #93c5fd; font-weight: 600; font-size: 11px; display: block; margin-bottom: 4px; }
  .panel-tip { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>📋 Task Board</h1>
    <span class="board-pick">ai-kanban</span>
    <span class="status-pill" id="pill"><span class="dot"></span><span class="pill-txt">orchestrator · live</span></span>
  </div>
  <div class="paused-banner" id="pausedBanner" hidden>
    <span>⏸ Demo paused — you're driving. Drag cards between columns, or click a card for details.</span>
    <button class="resume-btn" id="resumeBtn" type="button">▶ Resume demo</button>
  </div>
  <div class="board" id="board"></div>

  <!-- detail side panel (ticket #20): opens when a card is clicked, like the real board -->
  <div class="panel-overlay" id="overlay"></div>
  <aside class="panel" id="panel" aria-label="Ticket detail">
    <div class="panel-head">
      <h2 class="p-title"></h2>
      <button class="panel-close" id="panelClose" type="button" aria-label="Close">✕</button>
    </div>
    <div class="panel-body">
      <div class="panel-row">
        <span class="card-id p-id"></span>
        <span class="card-status-badge p-status"></span>
        <span class="model-badge p-model"></span>
      </div>
      <div>
        <div class="panel-label">Detail</div>
        <p class="panel-detail p-detail"></p>
      </div>
      <div>
        <div class="panel-label">Latest comment</div>
        <div class="panel-comment p-comment"></div>
      </div>
      <p class="panel-tip">Drag cards between columns to move them, then hit <strong>Resume demo</strong> to hand the board back to the orchestrator.</p>
    </div>
  </aside>

<script>
(function () {
  'use strict';

  // ── Column definitions (order = flow direction) ─────────────────────────────
  const COLS = [
    { key: 'todo',       label: 'To Do',       color: '#64748b' },
    { key: 'ready',      label: 'Ready',       color: '#f59e0b' },
    { key: 'inprogress', label: 'In Progress', color: '#3b82f6' },
    { key: 'done',       label: 'Done',        color: '#22c55e' },
  ];
  const STATUS = { todo: 'To Do', ready: 'Ready', inprogress: 'In Progress', done: 'Done' };
  const DONE_MAX = 3; // keep the Done column short so the board loops instead of growing

  // ── Ticket pool (cycles) — real ai-kanban / orchestrator flavour ────────────
  const POOL = [
    { title: 'Idempotent kanban server startup',   model: 'sonnet', comment: 'Added a single-instance guard; port 8745 no longer wedges. 262 tests pass.',
      detail: 'Duplicate server instances piled up and co-bound port 8745, wedging the API so boards failed to render. Startup now kills stale listeners before binding.' },
    { title: 'FLIP slide animation for card moves', model: 'sonnet', comment: 'Transforms only touch the GPU; slides land at 180ms. Suite green.',
      detail: 'Card moves jumped between columns. Reworked them as FLIP transitions so only transform/opacity animate — smooth and GPU-friendly.' },
    { title: 'Enforce orchestrator concurrency cap', model: 'opus',  comment: 'Cap honoured in orchestrator_core; 3 agents max. Unit tests pass.',
      detail: 'The headless loop could dispatch more sub-agents than the configured cap. Reap now runs before dispatch and stops once the in-flight count hits the limit.' },
    { title: 'Notification bell for blocked tickets', model: 'sonnet', comment: 'Badge hides at zero; blocked tickets now surface. 408 passing.',
      detail: 'Blocked tickets awaiting a human answer had no entry point. Added a topbar bell whose badge counts pending questions and hides at zero.' },
    { title: 'Two-column board settings modal',      model: 'sonnet', comment: 'Implemented the two-column modal; all 416 tests pass.',
      detail: 'The board-settings form was a tall single column. Split it into two columns to cut the modal height on smaller screens.' },
    { title: 'Performance tab CPU rollup',           model: 'haiku',  comment: 'Rolled up subprocess CPU over a 5-min window. psutil path ok.',
      detail: 'Rolled each Claude session’s subprocess-tree CPU/memory into a live 5-minute graph on the Performance tab, with a whole-tree kill button.' },
    { title: 'Docker dev-workspace image',           model: 'opus',   comment: 'node:20-slim + py3 + Claude CLI image builds clean. 407/410 in-container.',
      detail: 'Run each dispatched agent inside a per-repo container. Built a node:20-slim + Python image with the Claude CLI and pytest; secrets pass through by name.' },
    { title: 'Reduced-motion accessibility pass',    model: 'sonnet', comment: 'prefers-reduced-motion kills nonessential animation. Audit green.',
      detail: 'Honoured prefers-reduced-motion across the board UI so nonessential animation is disabled for visitors who ask for it.' },
  ];

  // ── State ───────────────────────────────────────────────────────────────────
  const cards = {};                                   // id -> {id, title, model, comment, detail, done, working}
  const state = { todo: [], ready: [], inprogress: [], done: [] };
  const els = new Map();                               // id -> card element
  let nextId = 1, poolAt = 0;
  // interactive-mode flags (ticket #20)
  let paused = false, interactive = false, dragId = null, panelId = null, _resume = null;

  function mint(seed) {
    const t = seed || POOL[poolAt++ % POOL.length];
    const id = nextId++;
    cards[id] = { id, title: t.title, model: t.model, comment: t.comment, detail: t.detail, done: false };
    return id;
  }

  // Seed the board so it already looks alive on the first frame.
  state.done.push((function () { const id = mint(); cards[id].done = true; return id; })());
  state.inprogress.push(mint());
  state.ready.push(mint(), mint());
  state.todo.push(mint(), mint());

  // ── DOM scaffolding ──────────────────────────────────────────────────────────
  const board = document.getElementById('board');
  const bodies = {};
  const counts = {};
  COLS.forEach(c => {
    const col = document.createElement('div');
    col.className = 'column';
    col.style.setProperty('--col-color', c.color);
    const hdr = document.createElement('div');
    hdr.className = 'col-header';
    const count = document.createElement('span');
    count.className = 'col-count';
    hdr.append(c.label + ' ', count);
    const body = document.createElement('div');
    body.className = 'col-body';
    // drop target for card drags (ticket #20)
    body.addEventListener('dragover', e => {
      if (dragId == null) return;
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      body.classList.add('drop-target');
    });
    body.addEventListener('dragleave', e => { if (!body.contains(e.relatedTarget)) body.classList.remove('drop-target'); });
    body.addEventListener('drop', e => {
      e.preventDefault(); body.classList.remove('drop-target');
      if (dragId != null) moveCard(dragId, c.key);
    });
    col.append(hdr, body);
    board.appendChild(col);
    bodies[c.key] = body;
    counts[c.key] = count;
  });

  function makeCard(id) {
    const c = cards[id];
    const el = document.createElement('div');
    el.className = 'card card-enter';
    el.dataset.id = id;
    el.innerHTML =
      '<div class="card-title"><span class="card-id">#' + id + '</span>' +
        '<span class="txt"></span></div>' +
      '<div class="card-agent">' +
        '<div class="agent-line"><span class="spinner"></span>🤖 <span class="am"></span> working…</div>' +
        '<div class="shimmer"></div>' +
      '</div>' +
      '<div class="card-comment"></div>' +
      '<div class="card-footer">' +
        '<span class="card-status-badge"></span>' +
        '<span class="model-badge ' + c.model + '">' + c.model + '</span>' +
      '</div>';
    el.querySelector('.txt').textContent = c.title;
    el.querySelector('.am').textContent = c.model;
    if (c.done) el.querySelector('.card-comment').textContent = c.comment; // pre-typed seed
    el.addEventListener('animationend', e => { if (e.animationName === 'cardEnter') el.classList.remove('card-enter'); });
    // ── interaction (ticket #20): click opens the detail panel; drag moves the card ──
    el.draggable = true;
    el.addEventListener('click', () => { enterInteractive(); openPanel(id); });
    el.addEventListener('dragstart', e => {
      enterInteractive();
      dragId = id;
      el.classList.add('dragging');
      if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; try { e.dataTransfer.setData('text/plain', String(id)); } catch (_) {} }
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging'); dragId = null;
      document.querySelectorAll('.col-body.drop-target').forEach(b => b.classList.remove('drop-target'));
    });
    els.set(id, el);
    return el;
  }

  const colOf = id => COLS.find(c => state[c.key].includes(id)).key;

  // Rewrite a card's per-column bits (status badge, done styling). The typed comment
  // element is left untouched here — the typing routine owns it.
  function paint(id) {
    const el = els.get(id), c = cards[id], key = colOf(id);
    el.querySelector('.card-status-badge').textContent = STATUS[key];
    el.classList.toggle('done', !!c.done);
    el.classList.toggle('working', c.working === true);
  }

  // ── FLIP: capture rects → move DOM in state order → invert & play ────────────
  function firstRects() {
    const m = new Map();
    els.forEach((el, id) => m.set(id, el.getBoundingClientRect()));
    return m;
  }
  function render(first) {
    COLS.forEach(c => {
      state[c.key].forEach(id => {
        const el = els.get(id) || makeCard(id);
        bodies[c.key].appendChild(el); // moves existing node, preserving it for FLIP
        paint(id);
      });
      const n = counts[c.key];
      if (n.textContent !== String(state[c.key].length)) {
        n.textContent = state[c.key].length;
        n.classList.remove('pop'); void n.offsetWidth; n.classList.add('pop');
      }
    });
    if (!first) return;
    els.forEach((el, id) => {
      const f = first.get(id);
      if (!f) return; // freshly created -> its own enter animation
      const l = el.getBoundingClientRect();
      const dx = f.left - l.left, dy = f.top - l.top;
      if (!dx && !dy) return;
      el.style.transition = 'none';
      el.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
      requestAnimationFrame(() => {
        el.style.transition = 'transform 340ms ' + getComputedStyle(document.documentElement).getPropertyValue('--ease-out');
        el.style.transform = '';
      });
    });
  }

  function exitCard(id) {
    const el = els.get(id);
    els.delete(id); delete cards[id];
    if (!el) return;
    el.classList.add('card-exit');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  // ── Demo clock — pausable so a click/drag can freeze the demo (ticket #20) ──────
  const _timers = new Set();
  function sleep(ms) {
    return new Promise(resolve => {
      const rec = {};
      const t = setTimeout(() => { _timers.delete(rec); resolve(); }, ms);
      rec.cancel = () => { clearTimeout(t); _timers.delete(rec); resolve(); };
      _timers.add(rec);
    });
  }
  function cancelTimers() { _timers.forEach(r => r.cancel()); }
  const untilResumed = () => new Promise(r => { _resume = r; });

  // ── Interactive mode: a click/drag stops the demo and hands over the board ───────
  const pill = document.getElementById('pill');
  const pausedBanner = document.getElementById('pausedBanner');
  const overlay = document.getElementById('overlay');
  const panel = document.getElementById('panel');

  function enterInteractive() {
    if (interactive) return;
    interactive = true;
    paused = true;
    cancelTimers();                 // unstick the in-flight sleep so run() parks promptly
    board.classList.add('interactive');
    pausedBanner.hidden = false;
    pill.classList.add('paused');
    pill.querySelector('.pill-txt').textContent = "paused · you're driving";
  }
  function resumeDemo() {
    if (!interactive) return;
    interactive = false;
    board.classList.remove('interactive');
    pausedBanner.hidden = true;
    pill.classList.remove('paused');
    pill.querySelector('.pill-txt').textContent = 'orchestrator · live';
    closePanel();
    paused = false;
    if (_resume) { const r = _resume; _resume = null; r(); } // wake the parked demo loop
  }

  // Move a card to another column (drag-drop), keeping the FLIP slide + counts in sync.
  function moveCard(id, targetKey) {
    if (!cards[id]) return;
    const fromKey = colOf(id);
    if (fromKey === targetKey) return;
    const first = firstRects();
    state[fromKey] = state[fromKey].filter(x => x !== id);
    if (targetKey === 'done') state.done.unshift(id); else state[targetKey].push(id);
    cards[id].working = false;
    cards[id].done = (targetKey === 'done');
    render(first);
    if (panelId === id) fillPanel(id); // keep an open panel's status in sync
  }

  // ── detail side panel ───────────────────────────────────────────────────────────
  function openPanel(id) { panelId = id; fillPanel(id); overlay.classList.add('open'); panel.classList.add('open'); }
  function closePanel() { panelId = null; overlay.classList.remove('open'); panel.classList.remove('open'); }
  function fillPanel(id) {
    const c = cards[id], key = colOf(id);
    panel.querySelector('.p-title').textContent = c.title;
    panel.querySelector('.p-id').textContent = '#' + id;
    panel.querySelector('.p-status').textContent = STATUS[key];
    const mb = panel.querySelector('.p-model');
    mb.className = 'model-badge p-model ' + c.model;
    mb.textContent = c.model;
    panel.querySelector('.p-detail').textContent = c.detail ||
      'A ticket on the ai-kanban board. The headless orchestrator triages it, then dispatches a Claude sub-agent to work it end-to-end.';
    const cm = panel.querySelector('.p-comment');
    if (c.comment) {
      cm.innerHTML = '<span class="who">🤖 ' + c.model + '</span>';
      cm.append(document.createTextNode(c.comment));
    } else {
      cm.textContent = 'No comments yet — the agent hasn’t started this ticket.';
    }
  }

  async function typeComment(id) {
    const el = els.get(id).querySelector('.card-comment');
    const text = cards[id].comment;
    el.textContent = '';
    for (let i = 0; i < text.length; i++) {
      if (paused) { el.textContent = text; return; } // fill instantly when the demo is frozen
      el.textContent += text[i];
      await sleep(24);
    }
  }

  // Complete the active card, then shuffle the pipeline forward one step.
  function advance(completedId) {
    const first = firstRects();
    cards[completedId].working = false;
    cards[completedId].done = true;
    state.inprogress = state.inprogress.filter(x => x !== completedId);
    state.done.unshift(completedId);
    while (state.done.length > DONE_MAX) exitCard(state.done.pop());
    if (state.ready.length) state.inprogress.push(state.ready.shift()); // Ready → In Progress
    if (state.todo.length) state.ready.push(state.todo.shift());        // To Do → Ready
    state.todo.push(mint());                                            // fresh card lands in To Do
    render(first);
  }

  async function run() {
    render(null); // initial paint (no FLIP)
    await sleep(1200);
    // eslint-disable-next-line no-constant-condition
    while (true) {
      if (paused) { await untilResumed(); continue; }
      if (!state.inprogress.length) {          // a manual drag may have emptied In Progress
        const first = firstRects();
        if (state.ready.length) state.inprogress.push(state.ready.shift());
        else if (state.todo.length) state.inprogress.push(state.todo.shift());
        else state.inprogress.push(mint());
        render(first);
        await sleep(700);
        continue;
      }
      const id = state.inprogress[0];
      cards[id].working = true;
      paint(id);
      await typeComment(id);
      if (paused) continue;
      await sleep(1100);
      if (paused) continue;
      advance(id);
      await sleep(1700); // let the slide settle before the next agent starts
    }
  }

  // ── wiring (ticket #20) ─────────────────────────────────────────────────────────
  document.getElementById('resumeBtn').addEventListener('click', resumeDemo);
  document.getElementById('panelClose').addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (panelId != null) closePanel();
    else if (interactive) resumeDemo();
  });

  run();
})();
</script>
</body>
</html>
